<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Transactions</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    	.back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #0077b6; /* A visually pleasing blue */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .back-button:hover {
            background-color: #005f8c; /* Darker blue for hover effect */
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Financial Planner</h1>
            </div>
            <ul class="nav-links">
                <li><a href="profile.html">Profile</a></li>
                <li><a href="#" id="logout">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
    	<section>
    		<a href="index.html" class="back-button">&larr; Back to Budgets</a>
    	</section>
        <h2 id="budget-title"></h2>
        <ul id="transaction-list"></ul>
    </main>

    <footer>
        <p>&copy; 2024 Financial Planner. All rights reserved.</p>
    </footer>

    <script>
        // Parse the budgetId from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const budgetId = urlParams.get('budgetId');
        const category = decodeURIComponent(urlParams.get('category'));
        
        if (!budgetId) {
            alert('Budget ID is missing. Redirecting to Home.');
            window.location.href = 'index.html';
        }
        
        const budgetTitleElement = document.getElementById('budget-title');
        budgetTitleElement.textContent = `Transactions for "${category}"`;

        // Fetch transactions from the server
        async function fetchTransactions() {
            try {
            	console.log('Budget ID:', budgetId);
                const response = await fetch(`/transactions/${budgetId}`, {
                    credentials: 'include', // Include session cookies for authentication
                });
				console.log('Fetch Response:', response);

                // Handle unauthorized access
                if (response.status === 401) {
                    alert('You are not logged in. Redirecting to login page.');
                    window.location.href = 'login.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to fetch transactions.');
                }

                const transactions = await response.json();
                renderTransactions(transactions);
            } catch (error) {
                console.error('Error fetching transactions:', error);
                alert('An error occurred while fetching transactions. Please try again.');
            }
        }

        // Render transactions on the page
		function renderTransactions(transactions) {
    		const transactionList = document.getElementById('transaction-list');
    		transactionList.innerHTML = ''; // Clear the list

    		if (transactions.length === 0) {
        		transactionList.innerHTML = '<p>No transactions found for this budget.</p>';
        		return;
    		}

    		transactions.forEach(txn => {
        		const li = document.createElement('li');
        		li.innerHTML = `
            		<span>${txn.title}: $${parseFloat(txn.amount).toFixed(2)}</span>
            		<button class="delete-btn" data-id="${txn.id}">Delete</button>
        		`;
        		transactionList.appendChild(li);
    		});

    		// Add event listeners for delete buttons
    		document.querySelectorAll('.delete-btn').forEach(button => {
        		button.addEventListener('click', async function () {
            		const transactionId = this.dataset.id;
            		const confirmDelete = confirm('Are you sure you want to delete this transaction?');
            		if (confirmDelete) {
                		await deleteTransaction(transactionId);
                		await fetchTransactions(); // Refresh the transactions list
            		}
        		});
    		});
		}
		
		async function deleteTransaction(transactionId) {
    		try {
        		const response = await fetch(`/transactions/${transactionId}`, {
            		method: 'DELETE',
            		credentials: 'include', // Include session cookies for authentication
        		});

        		if (!response.ok) {
            		throw new Error('Failed to delete transaction.');
        		}

        		const result = await response.json();
        		console.log('Transaction deleted:', result);
        		alert(result.message); // Notify the user
    		} catch (error) {
        		console.error('Error deleting transaction:', error);
        		alert('An error occurred while deleting the transaction. Please try again.');
    		}
		}

        // Logout functionality
        document.getElementById('logout').addEventListener('click', async function (e) {
            e.preventDefault();

            try {
                const response = await fetch('/logout', {
                    method: 'POST',
                    credentials: 'include', // Include session cookies
                });

                if (response.ok) {
                    window.location.href = 'login.html';
                } else {
                    alert('Logout failed. Please try again.');
                }
            } catch (error) {
                console.error('Error during logout:', error);
                alert('An error occurred during logout. Please try again.');
            }
        });

        // Fetch transactions when the page loads
        fetchTransactions();
    </script>
</body>
</html>
