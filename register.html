<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Financial Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Financial Planner</h1>
            </div>
        </nav>
    </header>

    <main>
        <section id="register">
            <h2>Create an Account</h2>
            <p>Register to access all the features of Financial Planner.</p>
            <form id="register-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Register</button>
                    <a href="login.html" class="btn register-btn">Back to Login</a>
                </div>
            </form>
            <p id="error-message" style="color: red; display: none;"></p>
            <p id="success-message" style="color: green; display: none;">Registration successful! Redirecting to login...</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Financial Planner. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            // Clear previous messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Check if passwords match
            if (password !== confirmPassword) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Passwords do not match. Please try again.';
                return;
            }

            // Make API request to register the user
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.style.display = 'block';
                    successMessage.textContent = 'Registration successful! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = data.error || 'Registration failed. Please try again.';
                }
            } catch (error) {
                console.error('Error registering user:', error);
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'An error occurred. Please try again later.';
            }
        });
    </script>
</body>
</html>
